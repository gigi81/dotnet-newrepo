name: CI

on:
  push:
    branches: [ main, 'release/**', 'feature/**' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  BUILD_CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.x'

    - name: Restore
      run: dotnet restore

    - name: Run .NET tests
      run: dotnet test --configuration ${{ env.BUILD_CONFIGURATION }} --report-trx --results-directory ./TestResults --coverage --coverage-output-format cobertura || true
      
    - name: .NET test report
      uses: dorny/test-reporter@v3
      if: ${{ !cancelled() }}
      with:
        name: test-results-dotnet-${{ matrix.os }}
        path: "./TestResults/*.trx"
        reporter: dotnet-trx
        fail-on-error: true
        
    - name: Convert .NET TRX to JUnit
      run: |
        mkdir -p junit
        dotnet tool install -g trx2junit
        trx2junit "./TestResults/*.trx" --output ./junit
        
    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v6
      with:
        name: Code coverage ${{ matrix.os }}
        path: |
          ./TestResults/*.cobertura.xml
          
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      if: runner.os == 'Linux'
      with:
        report_type: coverage
        files: "./TestResults/*.cobertura.xml,./TestResults/web-coverage/lcov.info"
        token: ${{ secrets.CODECOV_TOKEN }}
        
    - name: Upload test results to Codecov
      if: ${{ (!cancelled()) && (runner.os == 'Linux') }}
      uses: codecov/codecov-action@v5
      with:
        report_type: test_results
        files: "junit/*.xml,./TestResults/bun-junit.xml"
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Configure NuGet authentication
      run: dotnet nuget add source --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

    - name: Build
      run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore /p:PackageOutputPath="${{ github.workspace }}/artifacts"

    - name: Push to GitHub Packages
      if: startsWith(github.ref, 'refs/heads/main')
      run: Get-ChildItem "${{ github.workspace }}/artifacts/*.nupkg" | ForEach-Object { dotnet nuget push $_.FullName --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate }
      shell: pwsh

    - name: Push to NuGet.org
      if: startsWith(github.ref, 'refs/tags/v')
      run: Get-ChildItem "${{ github.workspace }}/artifacts/*.nupkg" | ForEach-Object { dotnet nuget push $_.FullName --source "https://api.nuget.org/v3/index.json" --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate }
      shell: pwsh
